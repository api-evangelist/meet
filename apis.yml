aid: meet
name: Google Meet
description: >-
  Google Meet is Google Workspace's secure video conferencing service for
  one-on-one calls, team meetings, large webinars, and live streamed events
  with features like noise cancellation, captions, recordings, and transcripts.
  The Google Meet REST API enables developers to programmatically create and
  manage meeting spaces, access conference records, list participants, and
  fetch artifacts such as recordings and transcripts directly from their apps.
